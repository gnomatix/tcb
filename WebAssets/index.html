<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Markdown</title>
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="print.css" media="print" />
</head>
<body class="mode-view show-statusbar">
  <header class="topbar">
    <span class="title" id="docTitle" role="button" tabindex="0" aria-label="File path — click to copy folder path to clipboard">untitled.md</span>
    <span class="dirty-dot" id="dirtyDot" aria-hidden="true" hidden></span>

    <span class="spacer"></span>

    <label class="flavor" title="Target Markdown flavor — Save will warn if features aren't supported">
      <span class="flavor-label">Flavor:</span>
      <select id="flavorSelect" class="flavor-select">
        <option value="any">Any</option>
        <option value="commonmark">CommonMark</option>
        <option value="gfm" selected>GitHub (GFM)</option>
        <option value="pandoc">Pandoc</option>
        <option value="multimarkdown">MultiMarkdown</option>
        <option value="obsidian">Obsidian</option>
      </select>
    </label>

    <button id="versionBarToggle" class="btn-icon" title="Versions (Ctrl+H)" aria-label="Toggle version bar" aria-pressed="false">🕒</button>
    <button id="printViewToggle" class="btn-icon" title="Print View (Ctrl+Shift+P) — Ctrl+P prints" aria-label="Toggle print view" aria-pressed="false">📄</button>
    <button id="aboutToggle" class="btn-icon" title="About TCB, M.D." aria-label="About">ℹ️</button>
    <button id="statusbarToggle" class="btn-icon" title="Toggle status bar" aria-pressed="true" aria-label="Toggle status bar">▾</button>

    <label class="toggle" title="Toggle edit mode (Ctrl+E)">
      <input type="checkbox" id="editToggle" />
      <span class="track"><span class="thumb"></span></span>
      <span class="toggle-label">Edit</span>
    </label>

    <button id="saveBtn" class="btn-primary" disabled title="Save (Ctrl+S)">Save</button>
  </header>

  <div class="version-bar" id="versionBar" hidden>
    <label class="version-bar-label" for="versionPicker">Version:</label>
    <select id="versionPicker" class="version-picker" disabled>
      <option value="__current__">Current (live)</option>
    </select>
    <span class="version-meta" id="versionMeta"></span>
    <span class="spacer"></span>
    <label class="backup-toggle" title="Save a snapshot of the current editor content before overwriting">
      <input type="checkbox" id="backupFirst" checked />
      <span>Backup current first</span>
    </label>
    <button id="restoreSelectedBtn" disabled>Restore selected</button>
  </div>

  <main>
    <article id="preview" class="markdown-body" aria-live="polite"></article>
    <textarea id="editor" hidden spellcheck="false" aria-label="Markdown source"></textarea>
    <section id="printView" class="print-view-container" hidden aria-label="Print preview">
      <header class="print-view-header">
        <span class="print-view-label" id="printViewStatus">Paginating…</span>
        <label class="print-size-toggle">
          Size:
          <select id="printSize">
            <option value="letter" selected>Letter</option>
            <option value="a4">A4</option>
            <option value="legal">Legal</option>
          </select>
        </label>
        <label class="typeset-toggle" title="Apply Crimson Pro serif typography, justified text, drop caps">
          <input type="checkbox" id="typesetToggle" />
          <span>Typeset</span>
        </label>
        <span class="spacer"></span>
        <button id="exportPdfBtn" class="btn-primary" hidden title="Export PDF via pandoc + typst (requires both binaries on PATH)">Export typeset PDF</button>
        <button id="printNowBtn" class="btn-primary" title="Print (Ctrl+P)">🖨 Print</button>
        <button id="printViewClose" class="btn-icon" aria-label="Close print view">×</button>
      </header>
      <div class="print-pages" id="printPages"></div>
    </section>
  </main>

  <footer class="statusbar" id="statusBar">
    <span class="features" id="features" aria-label="Detected markdown features"></span>
    <span class="spacer"></span>
    <span class="warn" id="flavorWarn" hidden></span>
    <span class="version-info" id="versionInfo" aria-label="Versioning backend"></span>
  </footer>

  <style id="printPageStyle">
    @page { size: letter; margin: 1in; }
  </style>

  <div class="about-overlay" id="aboutOverlay" hidden>
    <div class="about-dialog" role="dialog" aria-modal="true" aria-labelledby="aboutTitle">
      <button class="about-close btn-icon" id="aboutClose" aria-label="Close about">×</button>
      <h2 class="about-title" id="aboutTitle">TCB, M.D.</h2>
      <p class="about-version" id="aboutVersion" hidden></p>
      <p class="about-tagline">Taking Care of Business — a fast, native Markdown viewer &amp; editor.</p>
      <p class="about-bmac-msg">Buy me a coffee — thanks for your support! ☕</p>
      <img class="about-qr" id="bmacQr" src="gnomatix-bmac-qr-code.png"
           alt="Buy Me A Coffee QR code — scan to support the project" title="Click to zoom" />
      <p class="about-qr-hint">Scan the code with your phone. Click it to zoom in.</p>
    </div>
  </div>

  <script src="vendor/markdown-it.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
